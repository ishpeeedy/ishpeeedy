name: GitHub Snake Game
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate GitHub Contributions Snake Animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#a985ff&color_dots=#2a2a2a,#6b4fa8,#8a5fe0,#a985ff,#c9b0ff
            dist/github-snake-dark.svg?color_snake=#a985ff&color_dots=#2a2a2a,#6b4fa8,#8a5fe0,#a985ff,#c9b0ff&palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch empty dot color in SVGs
        run: |
          # Replace the default empty/zero cell fill colors with dark grey #2a2a2a
          # snk uses these specific color values for empty cells depending on palette
          sed -i 's/#ebedf0/#2a2a2a/g' dist/github-snake.svg
          sed -i 's/#161b22/#2a2a2a/g' dist/github-snake-dark.svg
          # Also catch any rgba or var references for level-0 dots
          sed -i 's/var(--color-calendar-graph-day-bg)/#2a2a2a/g' dist/github-snake.svg
          sed -i 's/var(--color-calendar-graph-day-bg)/#2a2a2a/g' dist/github-snake-dark.svg

      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update snake animation [skip ci]"
